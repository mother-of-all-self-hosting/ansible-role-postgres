---
name: Autotag dependency updates

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main

permissions:
  contents: write  # required to push tags
  actions: read

jobs:
  autotag:
    name: Autotag dependency updates
    runs-on: ubuntu-latest

    env:
      # Latest Postgres major version to auto-tag
      # Update this when a new major version becomes the latest
      POSTGRES_LATEST_MAJOR: "18"
      # Number of commits to check for Renovate updates
      # Increase if you experience high commit frequency
      COMMIT_FETCH_DEPTH: "20"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ env.COMMIT_FETCH_DEPTH }}  # Ensure enough history is available

      - name: Set up Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all tags from origin
        run: git fetch --tags

      - name: Find latest Renovate Docker commit for v18
        id: find_renovate_commit
        run: |
          # Check recent commits for a Renovate update to the latest Postgres major version
          MAJOR_VERSION="${POSTGRES_LATEST_MAJOR}"
          DEPTH="${COMMIT_FETCH_DEPTH}"
          git log -n "$DEPTH" --pretty=format:'%H|%an|%s' | while IFS='|' read -r commit author subject; do
            # Match only postgres Docker tag updates to the latest major version
            # Pattern: "Update postgres Docker tag to v18.X"
            if [[ "$author" == "renovate[bot]" && "${subject,,}" == *"update postgres docker tag to v${MAJOR_VERSION}."* ]]; then
              # Convert subject to lowercase for consistent regex matching
              # Postgres versions use major.minor format (e.g., 18.2, not 18.2.1)
              VERSION=$(echo "${subject,,}" | sed -E 's/.*docker tag to (v[0-9]+\.[0-9]+).*$/\1/')

              # Validate extracted version matches expected format
              if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+$ ]]; then
                echo "new_version=$VERSION" >> $GITHUB_OUTPUT
                echo "commit_hash=$commit" >> $GITHUB_OUTPUT
                echo "Found Renovate commit: $commit with version: $VERSION"
                break
              else
                echo "Warning: Extracted version '$VERSION' does not match expected format"
              fi
            fi
          done

      - name: Check if tag already exists
        id: check_tag
        if: steps.find_renovate_commit.outputs.new_version != ''
        run: |
          TAG="${{ steps.find_renovate_commit.outputs.new_version }}-0"
          if [ -n "$(git tag -l "$TAG")" ]; then
            echo "Tag $TAG already exists."
            echo "already_tagged=true" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG does not exist yet."
            echo "already_tagged=false" >> $GITHUB_OUTPUT
            echo "tag_name=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.already_tagged == 'false' && steps.find_renovate_commit.outputs.commit_hash != ''
        run: |
          TAG="${{ steps.check_tag.outputs.tag_name }}"
          HASH="${{ steps.find_renovate_commit.outputs.commit_hash }}"
          echo "Tagging commit $HASH with $TAG"
          git tag "$TAG" "$HASH"
          git push origin "$TAG"
